version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cms-ng-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cms_ng
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - cms-ng-network

  redis:
    image: redis:7-alpine
    container_name: cms-ng-redis
    restart: unless-stopped
    networks:
      - cms-ng-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cms-ng-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:root123@mysql:3306/cms_ng
      REDIS_URL: redis://redis:6379
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_API_BASE: https://api.moonshot.cn/v1
      KIMI_MODEL: moonshot-v1-8k
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - mysql
      - redis
    networks:
      - cms-ng-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://43.134.11.194:3001
    container_name: cms-ng-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "80:3000"
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cms-ng-network

volumes:
  mysql_data:

networks:
  cms-ng-network:
    driver: bridge
