# 生产编排：只承载应用容器（backend + frontend）。
# MySQL / Redis 为外部中间件，连接信息从 backend/.env 注入到 backend 容器（见 env_file）。
# 模板见 backend/.env.example。

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cms-ng-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # 容器内固定值，覆盖 .env 中可能存在的同名项
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - cms-ng-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # 前端构建期变量；如需变更，在 backend/.env 中加 NEXT_PUBLIC_API_URL
        # 并用 `docker compose --env-file backend/.env -f docker-compose.prod.yml ...` 调起
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://43.134.11.194:3001}
    container_name: cms-ng-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "80:3000"
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cms-ng-network

networks:
  cms-ng-network:
    driver: bridge
